<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender - Loan Prediction</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#f4f6f9;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
        }

        input[type=number], select{
            width:100%;
            padding:12px;
            margin-top:6px;
            margin-bottom:16px;
            border:1px solid #ccc;
            border-radius:4px;
            box-sizing:border-box;
        }

        input[type=submit]{
            width:100%;
            background:#04AA6D;
            color:white;
            padding:14px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:18px;
        }

        input[type=submit]:hover{
            background:#038b59;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Loan Prediction System</h1>

<form action="/predict" method="POST">

<label>Gender</label>

<select name="Gender">
<option value="1">Female</option>
<option value="0">Male</option>
</select>

<label>Married</label>

<select name="Married">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Dependents</label>

<input type="number" name="Dependents" min="0" max="3" required>

<label>Education</label>

<select name="Education">
<option value="1">Graduate</option>
<option value="0">Not Graduate</option>
</select>

<label>Self Employed</label>

<select name="Self_Employed">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Applicant Income</label>

<input type="number" name="ApplicantIncome" required>

<label>Coapplicant Income</label>

<input type="number" name="CoapplicantIncome" required>

<label>Loan Amount</label>

<input type="number" name="LoanAmount" required>

<label>Loan Amount Term</label>

<input type="number" name="Loan_Amount_Term" required>

<label>Credit History</label>

<select name="Credit_History">
<option value="1">Good</option>
<option value="0">Bad</option>
</select>

<label>Property Area</label>

<select name="Property_Area">
<option value="2">Urban</option>
<option value="1">Semi Urban</option>
<option value="0">Rural</option>
</select>

<input type="submit" value="Predict Loan Status">

</form>

</div>

</body>
</html>
